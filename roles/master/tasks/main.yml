---
- name: Remove old Jenkins repo
  file:
    path: /etc/apt/sources.list.d/jenkins.list
    state: absent

- name: Clean apt lists
  file:
    path: /var/lib/apt/lists/
    state: absent

- name: Clean apt cache
  apt:
    clean: yes

- name: Install dependencies
  apt:
    name:
      - openjdk-17-jdk
      - wget
      - curl
      - gnupg
    state: present
    update_cache: yes

# 🔥 Reliable key install (no keyserver issues)
- name: Add Jenkins key
  shell: |
    curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io.key | apt-key add -
  args:
    executable: /bin/bash

- name: Add Jenkins repository
  copy:
    dest: /etc/apt/sources.list.d/jenkins.list
    content: "deb https://pkg.jenkins.io/debian-stable binary/\n"

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Jenkins
  apt:
    name: jenkins
    state: present

- name: Enable and start Jenkins
  systemd:
    name: jenkins
    enabled: yes
    state: started
