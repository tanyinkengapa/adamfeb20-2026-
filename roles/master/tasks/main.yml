- name: Remove old Jenkins repo
  file:
    path: /etc/apt/sources.list.d/jenkins.list
    state: absent

- name: Clean apt lists
  file:
    path: /var/lib/apt/lists/
    state: absent

- name: Clean apt cache
  apt:
    clean: yes

- name: Install dependencies
  apt:
    name:
      - openjdk-17-jdk
      - gnupg
      - dirmngr
      - curl
    state: present
    update_cache: yes

# 🔥 FIXED: Use keyserver WITH retry + proper env
- name: Add Jenkins key (retry)
  shell: |
    apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 \
                --recv-keys 7198F4B714ABFC68
  register: key_result
  retries: 5
  delay: 10
  until: key_result.rc == 0

- name: Add Jenkins repository
  copy:
    dest: /etc/apt/sources.list.d/jenkins.list
    content: "deb https://pkg.jenkins.io/debian-stable binary/\n"

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Jenkins
  apt:
    name: jenkins
    state: present

- name: Enable and start Jenkins
  systemd:
    name: jenkins
    enabled: yes
    state: started
