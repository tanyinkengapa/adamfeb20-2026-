---
- name: Remove ALL Jenkins repo traces
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/jenkins.list
    - /usr/share/keyrings/jenkins-keyring.gpg

- name: Clean apt cache
  apt:
    clean: yes

- name: Install dependencies
  apt:
    name:
      - openjdk-17-jdk
      - wget
      - curl
      - gnupg
    state: present
    update_cache: yes

# 🔥 Download Jenkins key
- name: Download Jenkins key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
    dest: /tmp/jenkins.key

# 🔥 Convert key to .gpg (CRITICAL STEP)
- name: Dearmor Jenkins key
  command: >
    gpg --dearmor -o /usr/share/keyrings/jenkins-keyring.gpg /tmp/jenkins.key
  args:
    creates: /usr/share/keyrings/jenkins-keyring.gpg

# 🔥 Add repo using correct key format
- name: Add Jenkins repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Jenkins
  apt:
    name: jenkins
    state: present

- name: Start and enable Jenkins
  systemd:
    name: jenkins
    state: started
    enabled: yes
