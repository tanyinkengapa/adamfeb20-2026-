- name: Install required dependencies
  apt:
    name:
      - curl
      - gnupg
      - ca-certificates
    state: present
    update_cache: yes

# ✅ Correct Jenkins key installation (FIX)
- name: Add Jenkins GPG key
  shell: |
    curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key \
    | gpg --dearmor -o /usr/share/keyrings/jenkins-keyring.gpg
  args:
    creates: /usr/share/keyrings/jenkins-keyring.gpg

# ✅ Correct repo format for Ubuntu 24.04
- name: Add Jenkins repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins

# ✅ Update apt cache AFTER repo is added
- name: Update apt cache
  apt:
    update_cache: yes

# ✅ Install Java (REQUIRED for Jenkins)
- name: Install Java & required packages
  apt:
    name:
      - openjdk-17-jdk
      - fontconfig
      - nfs-common
    state: present

# ✅ Install Jenkins
- name: Install Jenkins
  apt:
    name: jenkins
    state: latest

# ✅ Ensure Jenkins is started
- name: Start and enable Jenkins
  systemd:
    name: jenkins
    state: started
    enabled: yes
