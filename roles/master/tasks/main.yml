---
- name: Remove old Jenkins repo
  file:
    path: /etc/apt/sources.list.d/jenkins.list
    state: absent

- name: Clean apt lists
  file:
    path: /var/lib/apt/lists/
    state: absent

- name: Clean apt cache
  apt:
    clean: yes

# 🔥 Use apt-key (your working method)
- name: Add Jenkins key (legacy but working)
  command: >
    apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 7198F4B714ABFC68
  args:
    warn: false

# 🔥 Add Jenkins repo
- name: Add Jenkins repository
  copy:
    dest: /etc/apt/sources.list.d/jenkins.list
    content: "deb https://pkg.jenkins.io/debian-stable binary/\n"

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Java
  apt:
    name: openjdk-17-jdk
    state: present

- name: Install Jenkins
  apt:
    name: jenkins
    state: present

- name: Enable Jenkins
  systemd:
    name: jenkins
    enabled: yes

- name: Start Jenkins
  systemd:
    name: jenkins
    state: started

- name: Check Jenkins status
  command: systemctl status jenkins
  register: jenkins_status
  changed_when: false

- name: Debug Jenkins status
  debug:
    var: jenkins_status.stdout
